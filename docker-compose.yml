services:
  db:
    image: postgres:15
    container_name: snippets-db
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    container_name: snippets-backend
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    container_name: snippets-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:5000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data: